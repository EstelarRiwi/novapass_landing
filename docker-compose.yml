services:
  app:
    build:
      context: .
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
    env_file:
      - .env
    volumes:
      - app-storage:/var/www/storage
    expose:
      - 9000
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:alpine
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/public:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - internal

volumes:
  app-storage:

networks:
  internal:
    driver: bridge
