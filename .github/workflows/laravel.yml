name: production

on:
  push:
    branches:
      - master

permissions:
  packages: write
  contents: read

env:
  IMAGE_TAG: ghcr.io/estelarriwi/novapass_landing:latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build -f Dockerfile \
            --build-arg VITE_API_URL=https://api.estelar.andrescortes.dev/api \
            -t ${{ env.IMAGE_TAG }} .
          docker push ${{ env.IMAGE_TAG }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            cd /var/www/novapass_landing || git clone https://github.com/EstelarRiwi/novapass_landing.git /var/www/novapass_landing
            cd /var/www/novapass_landing
            git pull
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.TOKEN }}
            docker compose pull app
            docker compose up -d --remove-orphans
            docker image prune -f
